name: Android Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main", "feature/mern-auth",  "feature/UI-enhance", "feature/setting-slide" ]
  pull_request:
    branches: [ "main", "feature/mern-auth",  "feature/UI-enhance", "feature/setting-slide" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create .env from secrets
        run: |
          echo "SUBSCRIPTION_URL=${{ secrets.SUBSCRIPTION_URL }}" > .env
          echo "AUTH_BASE_URL=${{ secrets.AUTH_BASE_URL }}" >> .env
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}

      - name: Create backend .env from secrets
        run: |
          mkdir -p backend-mern-auth-main
          {
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "MONGODB_URL=${{ secrets.MONGODB_URL }}"
            echo "BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}"
            echo "SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}"
            echo "ADMIN_APPROVAL_EMAIL=${{ secrets.ADMIN_APPROVAL_EMAIL }}"
            echo "XUI_PANEL_URL=${{ secrets.XUI_PANEL_URL }}"
            echo "XUI_USERNAME=${{ secrets.XUI_USERNAME }}"
            echo "XUI_PASSWORD=${{ secrets.XUI_PASSWORD }}"
            echo "XUI_INBOUND_ID=${{ secrets.XUI_INBOUND_ID }}"
            echo "XUI_DEFAULT_QUOTA_GB=${{ secrets.XUI_DEFAULT_QUOTA_GB }}"
            echo "XUI_DEFAULT_EXPIRY_DAYS=${{ secrets.XUI_DEFAULT_EXPIRY_DAYS }}"
            echo "XUI_SUB_PATH=${{ secrets.XUI_SUB_PATH }}"
            echo "XUI_SUB_URI=${{ secrets.XUI_SUB_URI }}"
          } > backend-mern-auth-main/.env

      - name: Remove broken launcher PNG for CI
        run: rm -f app/src/main/res/drawable/ic_launcher.png

      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug

      - name: List APK outputs
        run: find app/build/outputs/apk -type f -name "*.apk" -print

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bypassx-debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: error
