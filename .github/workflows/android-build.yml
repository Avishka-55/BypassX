name: Android Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main", "feature/mern-auth", "feature/3x-ui" ]
  pull_request:
    branches: [ "main", "feature/mern-auth", "feature/3x-ui" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create .env from secrets
        run: |
          echo "SUBSCRIPTION_URL=${{ secrets.SUBSCRIPTION_URL }}" > .env
          echo "AUTH_BASE_URL=${{ secrets.AUTH_BASE_URL }}" >> .env
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}

      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug

      - name: List APK outputs
        run: find app/build/outputs/apk -type f -name "*.apk" -print

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bypassx-debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: error
