name: Release Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - release
    tags:
      - "v*"

concurrency:
  group: release-android
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create app .env from secrets
        run: |
          echo "SUBSCRIPTION_URL=${{ secrets.SUBSCRIPTION_URL }}" > .env
          echo "AUTH_BASE_URL=${{ secrets.AUTH_BASE_URL }}" >> .env

      - name: Remove broken launcher PNG for CI
        run: rm -f app/src/main/res/drawable/ic_launcher.png

      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease

      - name: Decode keystore
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Sign release APK
        run: |
          set -euo pipefail
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "Unsigned APK not found at $UNSIGNED_APK"
            find app/build/outputs/apk -type f -name "*.apk" -print
            exit 1
          fi

          BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/34.0.0"
          ZIPALIGN="${BUILD_TOOLS_DIR}/zipalign"
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"

          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" app-release-aligned.apk

          "$APKSIGNER" sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out app-release-signed.apk \
            app-release-aligned.apk

          "$APKSIGNER" verify app-release-signed.apk

      - name: Read version info
        id: version
        run: |
          set -euo pipefail
          VERSION_NAME=$(grep -E 'versionName\s+"' app/build.gradle | head -n1 | sed -E 's/.*versionName\s+"([^"]+)".*/\1/')
          VERSION_CODE=$(grep -E 'versionCode\s+[0-9]+' app/build.gradle | head -n1 | sed -E 's/.*versionCode\s+([0-9]+).*/\1/')

          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_CODE" ]; then
            echo "Failed to read versionName/versionCode from app/build.gradle"
            exit 1
          fi

          APK_NAME="bypassx-v${VERSION_NAME}-${VERSION_CODE}.apk"
          mv app-release-signed.apk "$APK_NAME"
          sha256sum "$APK_NAME" > "${APK_NAME}.sha256"

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "apk_name=$APK_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: |
            ${{ steps.version.outputs.apk_name }}
            ${{ steps.version.outputs.apk_name }}.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.version.outputs.apk_name }}
            ${{ steps.version.outputs.apk_name }}.sha256

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      - name: Add droplet to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ vars.DO_SSH_PORT || 22 }}" -H "${{ vars.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload APK and metadata to droplet
        env:
          APK_NAME: ${{ steps.version.outputs.apk_name }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail

          sanitize_var() {
            printf '%s' "$1" | tr -d '\r\n' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g'
          }

          REMOTE_PATH_RAW="${{ vars.DO_APK_PATH || '/var/www/bypassx-apk' }}"
          BASE_URL_RAW="${{ vars.DO_APK_BASE_URL || '' }}"

          REMOTE_PATH="$(sanitize_var "$REMOTE_PATH_RAW")"
          BASE_URL="$(sanitize_var "$BASE_URL_RAW")"

          if [ -z "$REMOTE_PATH" ]; then
            echo "DO_APK_PATH is empty"
            exit 1
          fi

          if [ -z "$BASE_URL" ]; then
            echo "Set repository variable DO_APK_BASE_URL (example: https://your-domain.com/downloads/bypassx)"
            exit 1
          fi

          ssh -p "${{ vars.DO_SSH_PORT || 22 }}" "${{ vars.DO_USER }}@${{ vars.DO_HOST }}" "mkdir -p '$REMOTE_PATH'"

          rsync -az \
            -e "ssh -p ${{ vars.DO_SSH_PORT || 22 }}" \
            "$APK_NAME" "${APK_NAME}.sha256" \
            "${{ vars.DO_USER }}@${{ vars.DO_HOST }}:${REMOTE_PATH}/"

          ssh -p "${{ vars.DO_SSH_PORT || 22 }}" "${{ vars.DO_USER }}@${{ vars.DO_HOST }}" \
            "set -euo pipefail; cd '$REMOTE_PATH'; ln -sfn '$APK_NAME' latest.apk; ls -1t bypassx-v*.apk | tail -n +4 | xargs -r rm -f; ls -1t bypassx-v*.apk.sha256 | tail -n +4 | xargs -r rm -f"

          DOWNLOAD_URL="${BASE_URL%/}/${APK_NAME}"
          LATEST_URL="${BASE_URL%/}/latest.apk"

          cat > latest.json <<JSON
          {
            "versionName": "${VERSION_NAME}",
            "versionCode": ${VERSION_CODE},
            "apkName": "${APK_NAME}",
            "downloadUrl": "${DOWNLOAD_URL}",
            "latestUrl": "${LATEST_URL}",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          rsync -az \
            -e "ssh -p ${{ vars.DO_SSH_PORT || 22 }}" \
            latest.json \
            "${{ vars.DO_USER }}@${{ vars.DO_HOST }}:${REMOTE_PATH}/latest.json"

      - name: Cleanup local secrets
        if: always()
        run: rm -f release.keystore app-release-aligned.apk app-release-signed.apk latest.json